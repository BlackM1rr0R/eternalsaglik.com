<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background shapes -->
  <circle cx="400" cy="300" r="250" fill="#f0fdfa" opacity="0.5"/>
  <circle cx="550" cy="200" r="120" fill="#ccfbf1" opacity="0.4"/>
  <circle cx="250" cy="420" r="80" fill="#99f6e4" opacity="0.3"/>

  <!-- Stethoscope -->
  <path d="M350 180 C350 180 280 250 280 340 C280 390 310 420 360 420 C410 420 440 390 440 340 L440 280" stroke="#0d9488" stroke-width="8" fill="none" stroke-linecap="round"/>
  <circle cx="350" cy="170" r="20" fill="#0d9488"/>
  <circle cx="350" cy="170" r="10" fill="#f0fdfa"/>
  <circle cx="440" cy="270" r="15" fill="#14b8a6"/>

  <!-- Heart -->
  <path d="M500 250 C500 220 530 200 560 220 C590 200 620 220 620 250 C620 300 560 340 560 340 C560 340 500 300 500 250Z" fill="#f43f5e" opacity="0.15"/>
  <path d="M510 255 C510 230 535 215 555 230 C575 215 600 230 600 255 C600 295 555 325 555 325 C555 325 510 295 510 255Z" fill="#f43f5e" opacity="0.3"/>

