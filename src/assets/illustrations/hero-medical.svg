  <!-- Cross/Plus -->
  <rect x="160" y="180" width="60" height="20" rx="5" fill="#14b8a6" opacity="0.3"/>
  <rect x="180" y="160" width="20" height="60" rx="5" fill="#14b8a6" opacity="0.3"/>

  <!-- Pills -->
