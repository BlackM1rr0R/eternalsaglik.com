<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220" fill="none">
  <rect width="300" height="220" rx="12" fill="#f0fdfa"/>

  <!-- Desk/table line -->
  <line x1="30" y1="175" x2="270" y2="175" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Laptop -->
  <rect x="85" y="95" width="130" height="80" rx="8" fill="white" stroke="#0d9488" stroke-width="2"/>
  <rect x="95" y="105" width="110" height="55" rx="4" fill="#f0fdfa"/>
  <!-- Screen content - message lines -->
  <rect x="105" y="115" width="50" height="4" rx="2" fill="#0d9488" opacity="0.3"/>
  <rect x="105" y="124" width="70" height="4" rx="2" fill="#0d9488" opacity="0.2"/>
  <rect x="105" y="133" width="40" height="4" rx="2" fill="#0d9488" opacity="0.15"/>
  <rect x="105" y="145" width="30" height="10" rx="4" fill="#0d9488" opacity="0.25"/>
  <!-- Laptop base -->
  <rect x="70" y="175" width="160" height="6" rx="3" fill="#cbd5e1"/>

  <!-- Coffee mug -->
  <rect x="35" y="148" width="28" height="27" rx="4" fill="white" stroke="#d97706" stroke-width="1.5"/>
  <path d="M63 155 C70 155 72 162 63 165" stroke="#d97706" stroke-width="1.5" fill="none"/>
  <!-- Steam -->
  <path d="M44 142 C44 138 48 138 48 134" stroke="#d97706" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M52 140 C52 136 56 136 56 132" stroke="#d97706" stroke-width="1" fill="none" opacity="0.25" stroke-linecap="round"/>

  <!-- Small envelope floating -->
  <rect x="220" y="55" width="45" height="30" rx="5" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <polyline points="223,59 242,74 262,59" stroke="#3b82f6" stroke-width="1.5" fill="none"/>

  <!-- Phone floating -->
  <rect x="38" y="50" width="24" height="38" rx="5" fill="white" stroke="#0d9488" stroke-width="1.5"/>
  <rect x="42" y="58" width="16" height="18" rx="2" fill="#ccfbf1"/>
  <circle cx="50" cy="82" r="2.5" stroke="#0d9488" stroke-width="1" fill="none"/>

  <!-- Small notification dot -->
  <circle cx="258" cy="58" r="5" fill="#f43f5e" opacity="0.7"/>
  <text x="258" y="61" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">1</text>

  <!-- Plant -->
  <rect x="240" y="155" width="18" height="20" rx="4" fill="#ccfbf1" stroke="#0d9488" stroke-width="1"/>
  <line x1="249" y1="155" x2="249" y2="142" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="249" cy="138" r="6" fill="#0d9488" opacity="0.2"/>
  <circle cx="243" cy="143" r="4" fill="#0d9488" opacity="0.15"/>
  <circle cx="255" cy="143" r="4" fill="#0d9488" opacity="0.15"/>

  <!-- Text -->
  <text x="150" y="205" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#115e59">Iletisim</text>
</svg>
