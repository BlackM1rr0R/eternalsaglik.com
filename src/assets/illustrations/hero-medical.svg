  <rect x="620" y="400" width="50" height="22" rx="11" fill="#0d9488" opacity="0.25" transform="rotate(15 645 411)"/>

  <!-- Shield -->
  <path d="M680 120 L680 170 C680 200 660 220 640 230 C620 220 600 200 600 170 L600 120 L640 105 Z" fill="#0d9488" opacity="0.15" stroke="#0d9488" stroke-width="2" opacity="0.3"/>
  <path d="M625 160 L635 170 L660 145" stroke="#0d9488" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
